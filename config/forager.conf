CONFIG_ZMK_POINTING=y
CONFIG_ZMK_KEYBOARD_NAME="forager_sk"

# Enable experimental connection settings (disables 2M PHY to fix Realtek/Linux reconnect aborts)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable ZMK Deep Sleep
CONFIG_ZMK_SLEEP=y

# Set deep sleep timeout to 15 minutes (900,000 milliseconds)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

