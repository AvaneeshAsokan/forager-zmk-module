CONFIG_ZMK_KEYBOARD_NAME="forager_sk"

# ---------------------------------------------------------------------------
# Power / Sleep
# ---------------------------------------------------------------------------
# Idle: 1 min of inactivity → turn off LEDs. BLE stays connected; instant wakeup.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=60000
# Deep sleep: 30 min from last keypress → BLE disconnects to save battery.
# Waking from deep sleep takes a few seconds to re-advertise and reconnect.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# ---------------------------------------------------------------------------
# ZMK Studio — disabled (works around ZMK issue #3195: wake-from-sleep hang)
# ---------------------------------------------------------------------------
CONFIG_ZMK_STUDIO=n

# ---------------------------------------------------------------------------
# Output — prefer BLE by default so the keyboard doesn't get stuck on USB
# output mode after flashing. USB still works when BLE is unavailable.
# ---------------------------------------------------------------------------
CONFIG_ZMK_OUTPUT_DEFAULT_BLE=y

# ---------------------------------------------------------------------------
# Bluetooth stability (Linux + Windows)
# ---------------------------------------------------------------------------
# Experimental conn: disables 2M PHY for better compatibility with Linux & Windows hosts.
# NOTE: Do NOT enable EXPERIMENTAL_SEC — it requires a pairing PIN that can't be typed on the keyboard.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# Prevents spurious GATT subscription-enforcement disconnects (affects Linux & Windows).
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
# TX power +4 dBm — good range without the high current draw of +8 dBm.
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y
