CONFIG_ZMK_POINTING=y
CONFIG_ZMK_KEYBOARD_NAME="forager_sk"

# Enable deep sleep (15-minute timeout)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Disable ZMK Studio to resolve the wake-from-sleep hang (ZMK Issue #3195)
CONFIG_ZMK_STUDIO=n

# Boost Bluetooth TX power and enable experimental connection settings (fixes Linux reconnect aborts)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
